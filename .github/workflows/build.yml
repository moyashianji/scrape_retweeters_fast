name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- Python バックエンドを PyInstaller でビルド ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller fastapi uvicorn[standard] pydantic selenium webdriver-manager

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend-server \
            --hidden-import backend.app \
            --hidden-import backend.job_manager \
            --hidden-import backend.scraper_engine \
            --hidden-import backend.chrome_utils \
            --hidden-import backend.log_capture \
            --hidden-import backend.db \
            --hidden-import scrapers \
            --hidden-import scrapers.common \
            --hidden-import scrapers.retweeters_fast \
            --hidden-import scrapers.retweeters_hover \
            --hidden-import scrapers.quotes \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --hidden-import selenium \
            --hidden-import selenium.webdriver \
            --hidden-import selenium.webdriver.chrome \
            --hidden-import selenium.webdriver.chrome.webdriver \
            --hidden-import selenium.webdriver.chrome.service \
            --hidden-import selenium.webdriver.chrome.options \
            --hidden-import selenium.webdriver.common \
            --hidden-import selenium.webdriver.common.by \
            --hidden-import selenium.webdriver.common.action_chains \
            --hidden-import selenium.webdriver.support \
            --hidden-import selenium.webdriver.support.ui \
            --hidden-import selenium.webdriver.support.expected_conditions \
            --hidden-import webdriver_manager \
            --hidden-import webdriver_manager.chrome \
            --hidden-import webdriver_manager.core \
            --hidden-import webdriver_manager.core.driver_cache \
            --hidden-import webdriver_manager.core.download_manager \
            --hidden-import webdriver_manager.core.manager \
            --hidden-import webdriver_manager.core.os_manager \
            --add-data "backend:backend" \
            --add-data "scrapers:scrapers" \
            backend/run_server.py
        shell: bash

      - name: Prepare PyInstaller output for Electron
        run: |
          mkdir -p pyinstaller-dist
          cp dist/backend-server* pyinstaller-dist/
          ls -la pyinstaller-dist/
        shell: bash

      - name: Ad-hoc sign backend binary (macOS)
        if: matrix.platform == 'mac'
        run: |
          codesign --force --deep --sign - pyinstaller-dist/backend-server
          codesign --verify pyinstaller-dist/backend-server && echo "Signed OK" || echo "Sign verify failed"
        shell: bash

      # --- Node.js / Electron ビルド ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Build frontend
        working-directory: viewer
        run: npm run build

      - name: Verify frontend build
        run: ls viewer/dist/index.html
        shell: bash

      - name: Verify PyInstaller output
        run: ls -la pyinstaller-dist/
        shell: bash

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign .app bundle (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP_PATH=$(find release/mac* -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing: $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep "$APP_PATH" && echo "App signed OK" || echo "App sign verify failed"
          else
            echo "No .app found to sign"
            ls -la release/
          fi
        shell: bash

      - name: List release output
        if: always()
        run: ls -la release/ || echo "No release directory"
        shell: bash

      - name: Prepare macOS helper script
        if: matrix.platform == 'mac'
        run: |
          chmod +x build/fix-macos-warning.command
          cp build/fix-macos-warning.command release/fix-macos-warning.command
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.command
            !release/*-unpacked/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-win
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-mac
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: X Campaign Picker v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads
            - **Windows**: `.exe` installer (Python同梱済み、追加インストール不要)
            - **macOS**: `.dmg` disk image / `.zip` archive (Python同梱済み、追加インストール不要)
            - **macOS ヘルパー**: `fix-macos-warning.command` (セキュリティ警告解除用)

            ## 必要なもの
            - Google Chrome (スクレイピングに使用)

            ## macOS でセキュリティ警告が出る場合
            1. `fix-macos-warning.command` をダウンロード
            2. アプリを `/Applications` にインストール後、ヘルパーをダブルクリック
            3. 「ターミナルからのアクセス」を許可 → 完了！

            または手動で: アプリを右クリック → 「開く」→「開く」で起動できます。
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.command
          draft: false
          prerelease: false
