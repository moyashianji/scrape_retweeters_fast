name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- Python バックエンドを PyInstaller でビルド ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller fastapi uvicorn[standard] pydantic selenium webdriver-manager

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend-server \
            --hidden-import backend.app \
            --hidden-import backend.job_manager \
            --hidden-import backend.scraper_engine \
            --hidden-import backend.chrome_utils \
            --hidden-import backend.log_capture \
            --hidden-import backend.db \
            --hidden-import scrapers \
            --hidden-import scrapers.common \
            --hidden-import scrapers.retweeters_fast \
            --hidden-import scrapers.retweeters_hover \
            --hidden-import scrapers.quotes \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --add-data "backend:backend" \
            --add-data "scrapers:scrapers" \
            backend/run_server.py
        shell: bash

      - name: Prepare PyInstaller output for Electron
        run: |
          mkdir -p pyinstaller-dist
          cp dist/backend-server* pyinstaller-dist/
          ls -la pyinstaller-dist/
        shell: bash

      # --- Node.js / Electron ビルド ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Build frontend
        working-directory: viewer
        run: npm run build

      - name: Verify frontend build
        run: ls viewer/dist/index.html
        shell: bash

      - name: Verify PyInstaller output
        run: ls -la pyinstaller-dist/
        shell: bash

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Build Electron (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release output
        if: always()
        run: ls -la release/ || echo "No release directory"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            !release/*-unpacked/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-win
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-mac
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: X Campaign Picker v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads
            - **Windows**: `.exe` installer (Python同梱済み、追加インストール不要)
            - **macOS**: `.dmg` disk image / `.zip` archive (Python同梱済み、追加インストール不要)

            ## 必要なもの
            - Google Chrome (スクレイピングに使用)
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
